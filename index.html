<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Визуальный интерпретатор алгоритмов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Визуальный интерпретатор алгоритмов</h1>

    <div class="main">

        <!-- Левая часть: блоки -->
        <div class="left">
            <h3>Блоки</h3>

            <!-- Объявление переменных -->
            <div class="block" draggable="true" data-type="var">
                int
                <input type="text" value="a" placeholder="a, b, c">
                = 0
            </div>

            <!-- Присваивание -->
            <div class="block" draggable="true" data-type="assign">
                <input type="text" value="a" placeholder="переменная">
                =
                <input type="text" value="5 + 3" placeholder="выражение">
            </div>

            <div class="block" draggable="true" data-type="if">
    if
    <input type="text" value="a" placeholder="левое выражение">
    <select>
        <option value=">">></option>
        <option value="<"><</option>
        <option value="==">=</option>
        <option value="!=">!=</option>
        <option value=">=">>=</option>
        <option value="<="><=</option>
    </select>
    <input type="text" value="5" placeholder="правое выражение">
</div>

<div class="block" draggable="true" data-type="else">
    else
</div>
            <p class="hint">Перетащите блок в рабочую область</p>
        </div>

        <!-- Центр: рабочая зона -->
        <div class="center">
            <h3>Рабочая область</h3>
            <div id="dropZone" class="drop">
                <p class="placeholder">Сюда нужно перетаскивать блоки</p>
            </div>
        </div>

        <!-- Правая часть: управление -->
        <div class="right">
            <h3>Управление</h3>

            <button id="run">Запустить</button>
            <button id="clear">Очистить</button>

            <h4>Вывод:</h4>
            <pre id="output"></pre>

            <h4>Переменные:</h4>
            <pre id="vars">{}</pre>

            <h4>Ошибки:</h4>
            <div id="errors"></div>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
